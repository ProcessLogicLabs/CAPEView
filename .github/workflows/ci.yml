name: CI

on:
  # Direct pushes to main are gated locally by pre-commit (ruff + pytest), so
  # CI no longer fires on every commit — that just burned Actions minutes for
  # the same checks twice. PRs (when used) still get the safety net.
  pull_request:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check CAPEView scripts

      - name: Run tests
        run: pytest -q
